apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agriculture-assistant
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - REPLACE_WITH_PUBLIC_HOSTNAME
      secretName: agriculture-assistant-tls
  rules:
    - host: REPLACE_WITH_PUBLIC_HOSTNAME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agriculture-assistant
                port:
                  number: 80
